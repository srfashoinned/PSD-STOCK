<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1b3c55">
  <title>Stock Capture Pro • Photo + Details + WhatsApp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #f0f4fa 0%, #e8eef6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .app {
      max-width: 720px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0,20,40,0.08);
      padding: 20px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #eef3fa;
      padding-bottom: 14px;
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #0b2b4e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-badge {
      background: #1e4b6e;
      color: white;
      font-size: 0.75rem;
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 600;
    }
    .stats-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #f7faff;
      border-radius: 18px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1e405b;
      border: 1px solid #e2ebf7;
    }
    .photo-section {
      background: #f9fbfd;
      border-radius: 20px;
      padding: 14px;
      border: 1.5px dashed #c5d5e8;
    }
    .photo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
      min-height: 70px;
    }
    .photo-thumb {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      background: #eef2f7;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 2px solid white;
      position: relative;
      transition: 0.2s;
      cursor: pointer;
    }
    .photo-thumb:hover {
      transform: scale(1.03);
      border-color: #356c93;
    }
    .delete-photo {
      position: absolute;
      top: -7px;
      right: -7px;
      background: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #c92a2a;
      border: 1.5px solid #f1cfcf;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 2;
    }
    .add-photo-btn {
      background: white;
      border: 2px solid #2c5979;
      color: #1e3b4f;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      width: fit-content;
    }
    .add-photo-btn:hover {
      background: #e5eff9;
    }
    .add-photo-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .input-group.full {
      grid-column: 1 / -1;
    }
    label {
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #3a4d64;
    }
    input, select, textarea {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1.5px solid #dde4f1;
      background: #fdfeff;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #2f6690;
      box-shadow: 0 0 0 3px rgba(47,102,144,0.12);
    }
    textarea {
      resize: vertical;
      min-height: 50px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 13px 20px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.2s;
      border: 1.5px solid transparent;
      white-space: nowrap;
    }
    .btn-primary {
      background: #1b3c55;
      color: white;
      flex: 1;
    }
    .btn-primary:hover {
      background: #123046;
      transform: translateY(-1px);
    }
    .btn-outline {
      border: 1.5px solid #c5d4e8;
      color: #1f3b4f;
      background: white;
    }
    .btn-outline:hover {
      background: #f0f5fc;
    }
    .btn-whatsapp {
      background: #25D366;
      color: white;
      font-weight: 700;
      flex: 1;
      border-color: #25D366;
    }
    .btn-whatsapp:hover {
      background: #1fb855;
    }
    .btn-danger {
      background: #fff5f5;
      border-color: #f4c2c2;
      color: #a52323;
    }
    .btn-danger:hover {
      background: #ffe6e6;
    }
    .btn-success {
      background: #1a4b3b;
      color: white;
      border-color: #1a4b3b;
      width: 100%;
      font-size: 1rem;
      padding: 16px;
    }
    .btn-success:hover {
      background: #0e3629;
    }
    .edit-indicator {
      font-size: 0.8rem;
      background: #edf3fc;
      padding: 8px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2e4b6b;
      font-weight: 500;
    }
    .stock-list {
      background: #f9fcff;
      border-radius: 20px;
      padding: 10px;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e4ecf7;
    }
    .list-item {
      background: white;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid #ecf1f8;
      transition: 0.15s;
    }
    .list-item:hover {
      border-color: #bdd4f0;
    }
    .item-thumb {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      background: #eef3f9;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .item-info {
      flex: 1;
      min-width: 0;
    }
    .item-name {
      font-weight: 700;
      color: #0b2c44;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta {
      font-size: 0.75rem;
      color: #5b7896;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 3px;
    }
    .badge {
      background: #e4edf9;
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: 600;
      font-size: 0.7rem;
      color: #2c5277;
    }
    .item-actions {
      display: flex;
      gap: 4px;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 10px;
      transition: 0.15s;
    }
    .icon-btn:hover {
      background: #f0f5ff;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1b3c55;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .toast.show {
      opacity: 1;
    }
    .empty-state {
      text-align: center;
      padding: 30px;
      color: #8fa4bc;
    }
    hr {
      border: 0.5px solid #e6edf7;
      margin: 4px 0;
    }
    @media (max-width: 500px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .btn-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📸 Stock Capture Pro</h1>
    <span class="header-badge">v2.0</span>
  </div>

  <div class="stats-row">
    <div class="stat-card">📋 <span id="pendingCount">0 pending</span></div>
    <div class="stat-card">✅ <span id="submittedCount">0 submitted</span></div>
  </div>

  <!-- Photo Section -->
  <div class="photo-section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
      <strong style="font-size:0.85rem; color:#2b486b;">📷 Photos</strong>
      <span style="font-size:0.8rem; color:#5f7d9c;" id="photoCountLabel">0 / 5</span>
    </div>
    <div class="photo-grid" id="photoPreviewContainer">
      <div style="color:#b0c4db; font-size:0.85rem;">No photos yet</div>
    </div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple style="display:none;">
    <button class="add-photo-btn" id="openCameraBtn">
      📷 Take / Add Photos
    </button>
  </div>

  <!-- Form -->
  <div class="form-grid">
    <div class="input-group full">
      <label>📌 Item Name *</label>
      <input type="text" id="itemName" placeholder="e.g. Steel Rod 12mm" autocomplete="off">
    </div>
    <div class="input-group">
      <label>📦 Group *</label>
      <select id="itemGroup">
        <option value="" disabled selected>Select group</option>
        <option value="Raw Material">Raw Material</option>
        <option value="Hardware">Hardware</option>
        <option value="Packaging">Packaging</option>
        <option value="Electronics">Electronics</option>
        <option value="Finished Goods">Finished Goods</option>
        <option value="Consumables">Consumables</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="input-group">
      <label>🔢 Quantity *</label>
      <input type="number" id="itemQuantity" placeholder="0" min="0" step="any">
    </div>
    <div class="input-group full">
      <label>📝 Notes (optional)</label>
      <textarea id="itemNotes" placeholder="Batch number, supplier, location..." rows="2"></textarea>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-outline" id="clearFormBtn">🗑 Clear</button>
    <button class="btn btn-primary" id="saveItemBtn">💾 Save Item</button>
  </div>

  <div class="edit-indicator" id="editIndicator">
    ✏️ <span>New item mode</span>
  </div>

  <!-- Stock List -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h3 style="font-weight: 700; color:#1e3a4d; font-size:1.1rem;">📋 Pending Entries</h3>
    <div style="display:flex; gap:6px;">
      <button class="btn btn-outline" id="shareSingleBtn" style="padding:8px 14px; font-size:0.8rem;" title="Share list as text">📤 Share Text</button>
      <button class="btn btn-whatsapp" id="shareWhatsAppBtn" style="padding:8px 14px; font-size:0.8rem;">💬 WhatsApp</button>
    </div>
  </div>
  <div class="stock-list" id="stockListContainer">
    <div class="empty-state">📭 No items added yet</div>
  </div>

  <button class="btn btn-success" id="submitBatchBtn">
    ✅ SUBMIT BATCH & Save
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  (function() {
    // ---------- STATE ----------
    const MAX_PHOTOS = 5;
    let currentPhotos = [];
    let editingItemId = null;
    let stockItems = [];
    let submittedCount = 0;

    // Load submitted count from localStorage
    try {
      const batches = JSON.parse(localStorage.getItem('stockBatches') || '[]');
      submittedCount = batches.reduce((sum, b) => sum + (b.items?.length || 0), 0);
    } catch(e) {}

    // DOM
    const photoContainer = document.getElementById('photoPreviewContainer');
    const photoCountLabel = document.getElementById('photoCountLabel');
    const openCameraBtn = document.getElementById('openCameraBtn');
    const cameraInput = document.getElementById('cameraInput');
    const itemNameInput = document.getElementById('itemName');
    const itemGroupSelect = document.getElementById('itemGroup');
    const itemQuantityInput = document.getElementById('itemQuantity');
    const itemNotesInput = document.getElementById('itemNotes');
    const saveItemBtn = document.getElementById('saveItemBtn');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const stockListContainer = document.getElementById('stockListContainer');
    const pendingCountSpan = document.getElementById('pendingCount');
    const submittedCountSpan = document.getElementById('submittedCount');
    const submitBatchBtn = document.getElementById('submitBatchBtn');
    const editIndicator = document.getElementById('editIndicator');
    const shareWhatsAppBtn = document.getElementById('shareWhatsAppBtn');
    const shareSingleBtn = document.getElementById('shareSingleBtn');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function updateCounts() {
      pendingCountSpan.textContent = `${stockItems.length} pending`;
      submittedCountSpan.textContent = `${submittedCount} submitted`;
    }

    function updatePhotoUI() {
      photoContainer.innerHTML = '';
      if (currentPhotos.length === 0) {
        photoContainer.innerHTML = '<div style="color:#b0c4db; font-size:0.85rem; width:100%;">No photos yet</div>';
      } else {
        currentPhotos.forEach((photoData, index) => {
          const thumb = document.createElement('div');
          thumb.className = 'photo-thumb';
          thumb.style.backgroundImage = `url(${photoData})`;
          thumb.title = 'Click to view / Remove with X';
          const delBtn = document.createElement('span');
          delBtn.className = 'delete-photo';
          delBtn.innerHTML = '×';
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            removePhotoAtIndex(index);
          });
          thumb.appendChild(delBtn);
          // Click on photo to view full (optional)
          thumb.addEventListener('click', () => {
            window.open(photoData, '_blank');
          });
          photoContainer.appendChild(thumb);
        });
      }
      photoCountLabel.textContent = `${currentPhotos.length} / ${MAX_PHOTOS}`;
    }

    function removePhotoAtIndex(index) {
      currentPhotos.splice(index, 1);
      updatePhotoUI();
    }

    function addPhotosFromFiles(files) {
      if (!files || files.length === 0) return;
      const remaining = MAX_PHOTOS - currentPhotos.length;
      if (remaining <= 0) {
        showToast('⚠️ Maximum 5 photos allowed');
        return;
      }
      const toProcess = Array.from(files).slice(0, remaining);
      toProcess.forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
          currentPhotos.push(e.target.result);
          updatePhotoUI();
        };
        reader.readAsDataURL(file);
      });
      if (files.length > remaining) {
        showToast(`Only ${remaining} photo(s) added (max 5)`);
      }
    }

    function resetForm() {
      currentPhotos = [];
      editingItemId = null;
      itemNameInput.value = '';
      itemGroupSelect.value = '';
      itemQuantityInput.value = '';
      itemNotesInput.value = '';
      updatePhotoUI();
      editIndicator.innerHTML = '✏️ <span>New item mode</span>';
    }

    function loadItemForEditing(item) {
      currentPhotos = [...item.photos];
      editingItemId = item.id;
      itemNameInput.value = item.name || '';
      itemGroupSelect.value = item.group || '';
      itemQuantityInput.value = item.quantity ?? '';
      itemNotesInput.value = item.notes || '';
      updatePhotoUI();
      editIndicator.innerHTML = `✏️ <span>Editing: <strong>${escapeHtml(item.name || 'Unnamed')}</strong></span>`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function getFormData() {
      return {
        name: itemNameInput.value.trim(),
        group: itemGroupSelect.value,
        quantity: itemQuantityInput.value.trim() === '' ? null : parseFloat(itemQuantityInput.value),
        notes: itemNotesInput.value.trim(),
      };
    }

    function validateForm(data) {
      if (!data.name) return 'Item name is required.';
      if (!data.group) return 'Please select a group.';
      if (data.quantity === null || isNaN(data.quantity) || data.quantity < 0) return 'Enter a valid quantity (0 or more).';
      if (currentPhotos.length === 0) return 'Add at least one photo.';
      return null;
    }

    function saveItem() {
      const data = getFormData();
      const error = validateForm(data);
      if (error) { showToast('⚠️ ' + error); return false; }

      if (editingItemId !== null) {
        const idx = stockItems.findIndex(i => i.id === editingItemId);
        if (idx !== -1) {
          stockItems[idx] = {
            ...stockItems[idx],
            name: data.name,
            group: data.group,
            quantity: data.quantity,
            notes: data.notes,
            photos: [...currentPhotos],
          };
        } else {
          editingItemId = null;
        }
      }

      if (editingItemId === null) {
        stockItems.push({
          id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
          name: data.name,
          group: data.group,
          quantity: data.quantity,
          notes: data.notes,
          photos: [...currentPhotos],
          timestamp: new Date().toISOString(),
        });
      }

      resetForm();
      renderStockList();
      showToast('✅ Item saved!');
      return true;
    }

    function deleteItem(id) {
      if (!confirm('Delete this item?')) return;
      stockItems = stockItems.filter(i => i.id !== id);
      if (editingItemId === id) resetForm();
      renderStockList();
      showToast('🗑 Item deleted');
    }

    function renderStockList() {
      stockListContainer.innerHTML = '';
      updateCounts();

      if (stockItems.length === 0) {
        stockListContainer.innerHTML = '<div class="empty-state">📭 No items added yet</div>';
        return;
      }

      stockItems.forEach(item => {
        const card = document.createElement('div');
        card.className = 'list-item';

        const thumb = document.createElement('div');
        thumb.className = 'item-thumb';
        thumb.style.backgroundImage = item.photos?.length > 0 ? `url(${item.photos[0]})` : 'none';
        if (!item.photos?.length) thumb.style.background = '#dce5f0';

        const info = document.createElement('div');
        info.className = 'item-info';
        info.innerHTML = `
          <div class="item-name">${escapeHtml(item.name)} <span class="badge">${item.photos?.length || 0} 📷</span></div>
          <div class="item-meta">
            <span>📦 ${escapeHtml(item.group)}</span>
            <span>🔢 ${item.quantity}</span>
            ${item.notes ? `<span>📝 ${escapeHtml(item.notes.substring(0,20))}${item.notes.length>20?'...':''}</span>` : ''}
          </div>
        `;

        const actions = document.createElement('div');
        actions.className = 'item-actions';
        actions.innerHTML = `
          <button class="icon-btn edit-btn" title="Edit">✏️</button>
          <button class="icon-btn delete-btn" title="Delete">🗑️</button>
        `;

        actions.querySelector('.edit-btn').addEventListener('click', () => loadItemForEditing(item));
        actions.querySelector('.delete-btn').addEventListener('click', () => deleteItem(item.id));

        card.appendChild(thumb);
        card.appendChild(info);
        card.appendChild(actions);
        stockListContainer.appendChild(card);
      });
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]);
    }

    // WhatsApp Share - formats text summary
    function generateTextSummary() {
      if (stockItems.length === 0) return null;
      let text = `📦 *STOCK BATCH SUMMARY*\n`;
      text += `📅 ${new Date().toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}\n`;
      text += `⏰ ${new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}\n`;
      text += `📋 Total Items: ${stockItems.length}\n`;
      text += `━`.repeat(20) + `\n`;
      
      stockItems.forEach((item, i) => {
        text += `\n${i+1}. *${item.name}*\n`;
        text += `   📦 Group: ${item.group}\n`;
        text += `   🔢 Qty: ${item.quantity}\n`;
        if (item.notes) text += `   📝 ${item.notes}\n`;
        text += `   📷 Photos: ${item.photos?.length || 0}\n`;
      });
      
      text += `\n━`.repeat(20) + `\n`;
      text += `✅ _Sent via Stock Capture Pro_`;
      return text;
    }

    function shareToWhatsApp() {
      const summary = generateTextSummary();
      if (!summary) {
        showToast('⚠️ No items to share');
        return;
      }
      const encoded = encodeURIComponent(summary);
      const url = `https://wa.me/?text=${encoded}`;
      window.open(url, '_blank');
      showToast('💬 Opening WhatsApp...');
    }

    function shareAsText() {
      const summary = generateTextSummary();
      if (!summary) {
        showToast('⚠️ No items to share');
        return;
      }
      if (navigator.share) {
        navigator.share({ text: summary }).catch(() => {});
      } else {
        navigator.clipboard.writeText(summary).then(() => {
          showToast('📋 Copied to clipboard!');
        }).catch(() => {
          prompt('Copy this text:', summary);
        });
      }
    }

    function submitBatch() {
      if (stockItems.length === 0) {
        showToast('⚠️ Add at least one item first');
        return;
      }
      if (!confirm(`Submit batch with ${stockItems.length} item(s)? This saves locally and clears the list.`)) return;

      const batch = {
        batchId: 'BATCH-' + Date.now().toString(36).toUpperCase(),
        timestamp: new Date().toISOString(),
        items: [...stockItems],
      };

      let batches = [];
      try { batches = JSON.parse(localStorage.getItem('stockBatches') || '[]'); } catch(e) {}
      batches.push(batch);
      localStorage.setItem('stockBatches', JSON.stringify(batches));

      submittedCount += stockItems.length;
      stockItems = [];
      resetForm();
      renderStockList();
      updateCounts();
      showToast(`✅ Batch submitted! (${batch.batchId})`);
    }

    // Event Listeners
    openCameraBtn.addEventListener('click', () => {
      if (currentPhotos.length >= MAX_PHOTOS) {
        showToast('⚠️ Max 5 photos. Remove some first.');
        return;
      }
      cameraInput.click();
    });

    cameraInput.addEventListener('change', (e) => {
      addPhotosFromFiles(e.target.files);
      cameraInput.value = '';
    });

    saveItemBtn.addEventListener('click', saveItem);

    clearFormBtn.addEventListener('click', () => {
      if (currentPhotos.length || itemNameInput.value || itemGroupSelect.value || itemQuantityInput.value || itemNotesInput.value) {
        if (confirm('Clear all fields? Unsaved changes lost.')) resetForm();
      } else {
        resetForm();
      }
    });

    shareWhatsAppBtn.addEventListener('click', shareToWhatsApp);
    shareSingleBtn.addEventListener('click', shareAsText);
    submitBatchBtn.addEventListener('click', submitBatch);

    // Initial render
    renderStockList();
    updatePhotoUI();
    updateCounts();

    // Warn before leaving with unsaved items
    window.addEventListener('beforeunload', (e) => {
      if (stockItems.length > 0) {
        e.preventDefault();
        e.returnValue = 'You have unsaved stock items.';
      }
    });
  })();
</script>
</body>
</html>
